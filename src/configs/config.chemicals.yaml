---
KEYCLOAK:
  JWT_AUDIENCE: account
  JWT_ISSUER: https://iam.ideaconsult.net/realms/nano
  OPENID_CONFIG_URI: https://iam.ideaconsult.net/realms/nano/.well-known/openid-configuration
SOLR_COLLECTIONS:
  collections:
    - description: CHARISMA
      license: TBD
      name: charisma
      roles:
        - public
    - description: PLASTIC
      license: TBD
      name: plastic
      roles:
        - public
    - description: VEGA QSAR predictions
      license: Public
      name: vega
      roles:
        - public
    - description: DSSTox https://www.epa.gov/comptox-tools/distributed-structure-searchable-toxicity-dsstox-database
      license: Public
      name: dsstox
      roles:
        - public
  default: dsstox
SOLR_DOCS:
  - study
  - model
  - chemical
  - inventory
  - prediction
SOLR_FIELDS:
  - field: qdynamic.casrn_s
    name: CAS RN
    search: /db/query/field/terms
    use: qdynamic
  - field: qdynamic.preferred_name_t
    icon: fa6/FaVial
    name: Chemical name
    search: /db/query/field/terms
    use: qdynamic
  - field: qdynamic.inchi_key_s
    icon: fa6/FaVial
    name: InChI key
    search: /db/query/field/terms
    use: qdynamic
  - field: qdynamic.SMILES_s
    icon: fa6/FaVial
    name: SMILES
    search: /db/query/field/terms
    use: qdynamic
  - field: q_reference
    icon: fa6/FaBookOpen
    name: Reference
    search: /db/query/field
  - field: qdynamic.type_s
    icon: fa6/FaFileLines
    name: Item types
    search: /db/query/field
    use: qdynamic
SOLR_ROOT: https://solr-kc.ideaconsult.net/solr/
SOLR_SIMILARITY:
  - name: Text search
    vector: None
  - name: Raman spectrum
    vector: spectrum_p1024
  - name: Molecule
    vector: dense_a512
    vector_len: 512
SOLR_VECTOR: spectrum_p1024
application_name: NAMbit
nmparse_url: https://api.ideaconsult.net/gracious/enm/gracious/nmparser
upload_dir: uploads
