SOLR_DOCS:
  - study
  - aop
  - assay
  - substance
  - key_event
  - stressor
  - chemical
  - inventory
SOLR_FIELDS:
  - field: q_provider
    icon: fa6/FaUser
    name: Data provider
    search: /db/query/field
  - field: q_reference
    icon: fa6/FaBookOpen
    name: Investigation
    search: /db/query/field
  - field: qdynamic.name_s
    icon: fa6/FaVial
    name: Sample
    search: /db/query/field/terms
    use: qdynamic
  - field: publicname_s
    icon: fa6/FaCube
    name: Material
    search: /db/query/field/terms
  - field: qdynamic.instrument_s
    icon: fa6/FaMicroscope
    name: Instrument
    search: /db/query/field/terms
    use: qdynamic
  - field: q_method
    icon: fa6/FaFlaskVial
    name: Method
    search: /db/query/field
  - field: qdynamic.type_s
    icon: fa6/FaFileLines
    name: Documents
    search: /db/query/field
    use: qdynamic
SOLR_ROOT: https://solr-kc.ideaconsult.net/solr/
SOLR_SIMILARITY:
  - name: Raman spectrum
    vector: spectrum_p1024
  - name: Chemical
    vector: dense_512
SOLR_VECTOR: spectrum_p1024
