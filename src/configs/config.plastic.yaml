SOLR_COLLECTIONS:
  collections:
    - description: POLYRISK
      license: TBD
      name: polyrisk
      roles:
        - polyrisk
    - description: POLYRISK Spectra
      license: TBD
      name: polyrisk_spectra
      roles:
        - polyrisk        
    - description: PLASTICFATE
      license: TBD
      name: plasticfate
      roles:
        - plasticfate
    - description: PLASTICHEAL
      license: TBD
      name: plasticheal
      roles:
        - plasticheal
    - description: MOMENTUM
      license: TBD
      name: momentum
      roles:
        - momentum        
    - description: PlasticMap
      license: TBD
      name: ambitlri_plasticmap
      roles:
        - public
    - description: Aop Mapper
      license: TBD
      name: aop4enm
